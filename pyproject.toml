[tool.ruff]
line-length = 100
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501", "B008"]
exclude = ["infra/", ".venv/", "build/"]

[tool.ruff.isort]
known-first-party = ["config", "pipelines", "producers"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
exclude = ["infra/", "tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "unit: fast, no external deps",
    "integration: requires live GCS/BQ dev project",
    "e2e: full pipeline end-to-end",
]

[tool.coverage.run]
source = ["producers", "pipelines"]
omit = ["tests/*", "infra/*", "dags/*"]